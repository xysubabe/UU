spring.application.name=uu-backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/uu?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis-Plus Configuration
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml
mybatis-plus.type-aliases-package=com.uu.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true